# Ежедневная публикация поста дня в Facebook и LinkedIn
name: marketing-publish

on:
  schedule:
    - cron: '0 14 * * *' # 14:00 UTC — прайм-тайм EU/US
  workflow_dispatch: {}

concurrency: marketing

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node marketing/publish.js
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          LINKEDIN_TOKEN: ${{ secrets.LINKEDIN_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
      - name: Commit publish state
        if: always()
        run: |
          git config user.name "marketing-bot"
          git config user.email "actions@github.com"
          git add marketing/queue
          git commit -m "marketing: publish state [skip railway]" || exit 0
          git pull --rebase origin main
          git push
