# Еженедельная генерация пачки постов (Claude API) → коммит в marketing/queue/
name: marketing-generate

on:
  schedule:
    - cron: '0 6 * * 1' # понедельник 06:00 UTC
  workflow_dispatch: {}

concurrency: marketing

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: sudo apt-get install -y ffmpeg # для TikTok-видео (в образе раннера его нет)
      - run: npm ci --prefix marketing
      - run: node marketing/generate.js --posts 7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit queue
        run: |
          git config user.name "marketing-bot"
          git config user.email "actions@github.com"
          git add marketing/queue marketing/state.json
          # "[skip railway]" — чтобы коммит очереди не пересобирал прод на Railway
          git commit -m "marketing: weekly content batch [skip railway]" || exit 0
          git pull --rebase origin main
          git push
