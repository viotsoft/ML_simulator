<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Career Simulator — админка</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="admin-shell">
  <div class="admin-header">
    <h1>👥 Зарегистрированные пользователи</h1>
    <div>
      <a href="/admin/marketing" class="btn btn-ghost" style="padding:9px 18px;font-size:14px">📣 Маркетинг</a>
      <a href="/app.html" class="btn btn-ghost" style="padding:9px 18px;font-size:14px">← В приложение</a>
    </div>
  </div>

  <div class="admin-stats" id="stats"></div>

  <input class="admin-search" id="search" type="text" placeholder="Поиск по имени или email…">

  <div class="admin-table-wrap">
    <table class="admin-table" id="table" hidden>
      <thead>
        <tr>
          <th>Имя</th>
          <th>Email</th>
          <th>Регистрация</th>
          <th>Источник</th>
          <th>Подписка</th>
          <th>Прогресс</th>
          <th>Сертификат</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="admin-empty" id="empty" hidden>Пока никто не зарегистрировался.</div>
  </div>
</div>

<script>
const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

const fmtDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU', { day: '2-digit', month: 'short', year: 'numeric' });
};

let ALL_USERS = [];

function render(users) {
  const tbody = document.getElementById('tbody');
  const table = document.getElementById('table');
  const empty = document.getElementById('empty');
  if (!users.length) {
    table.hidden = true;
    empty.hidden = false;
    return;
  }
  table.hidden = false;
  empty.hidden = true;
  tbody.innerHTML = users.map((u) => `
    <tr>
      <td>${esc(u.name)}</td>
      <td>${esc(u.email)}</td>
      <td>${fmtDate(u.createdAt)}</td>
      <td>${u.source ? esc(u.source) : '—'}</td>
      <td>${u.subscribed
        ? '<span class="badge badge-pro">PRO</span>'
        : '<span class="badge badge-free">FREE</span>'}</td>
      <td>${u.passedCount} / 20</td>
      <td>${u.certificateReady ? '🎓 да' : '—'}</td>
    </tr>`).join('');
}

async function load() {
  const res = await fetch('/api/admin/users', { credentials: 'same-origin' });
  if (!res.ok) {
    document.getElementById('stats').innerHTML =
      `<div class="admin-stat"><div class="l">Ошибка загрузки (${res.status})</div></div>`;
    return;
  }
  const data = await res.json();
  ALL_USERS = data.users;
  document.getElementById('stats').innerHTML = `
    <div class="admin-stat"><div class="n">${data.total}</div><div class="l">Всего пользователей</div></div>
    <div class="admin-stat"><div class="n">${data.subscribed}</div><div class="l">С подпиской PRO</div></div>
    <div class="admin-stat"><div class="n">${data.certified}</div><div class="l">Получили сертификат</div></div>
  `;
  render(ALL_USERS);
}

document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  render(!q ? ALL_USERS : ALL_USERS.filter((u) =>
    u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
});

load();
</script>
</body>
</html>
